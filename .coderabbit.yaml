# https://docs.coderabbit.ai/reference/yaml-template
language: ko-KR
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: "TypeScript/React 관례 준수 여부 확인. 타입 안전성(any/non-null 단언 회피), React Hook 의존성 배열 정확성, 렌더 중 부수효과, 상태 관리, 키 누락, 접근성 위주로 점검."
chat:
  auto_reply: true

  <circle cx="46" cy="85" r="1.0" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="72" cy="25" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="78" cy="45" r="1.2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="70" cy="65" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="76" cy="80" r="1.0" fill="#FFFFFF" opacity="0.5"/>
